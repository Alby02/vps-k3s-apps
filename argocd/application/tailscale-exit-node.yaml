apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-exit-node
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/Alby02/vps-k3s-apps.git
    targetRevision: HEAD
    path: k8s/tailscale-exit-node
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
